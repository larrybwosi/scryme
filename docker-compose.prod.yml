services:
  # --- DATABASES ---
  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - scryme-prod-network
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  zitadel-db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: ${ZITADEL_DB_USER}
      POSTGRES_PASSWORD: ${ZITADEL_DB_PASSWORD}
      POSTGRES_DB: ${ZITADEL_DB_NAME}
    volumes:
      - zitadel_data:/var/lib/postgresql/data
    networks:
      - scryme-prod-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  windmill-db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: ${WINDMILL_DB_USER}
      POSTGRES_PASSWORD: ${WINDMILL_DB_PASSWORD}
      POSTGRES_DB: ${WINDMILL_DB_NAME}
    volumes:
      - windmill_data:/var/lib/postgresql/data
    networks:
      - scryme-prod-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- INFRASTRUCTURE ---
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --save 60 1 --loglevel warning --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_prod_data:/data
    networks:
      - scryme-prod-network
    deploy:
      resources:
        limits:
          memory: 384M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - rabbitmq_prod_data:/var/lib/rabbitmq
    networks:
      - scryme-prod-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rustfs-perms:
    image: alpine
    user: root
    volumes:
      - rustfs_prod_data:/fix_path
    command: sh -c "chown -R 10001:10001 /fix_path && touch /tmp/done && sleep infinity"
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/done"]
      interval: 5s
      timeout: 2s
      retries: 3
    networks:
      - scryme-prod-network

  rustfs:
    image: rustfs/rustfs:latest
    restart: always
    environment:
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY}
      - RUSTFS_CONSOLE_ENABLE=true
    volumes:
      - rustfs_prod_data:/data
    depends_on:
      rustfs-perms:
        condition: service_healthy
    networks:
      - scryme-prod-network
      - proxy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://localhost:9000/health || wget --no-verbose --tries=1 --spider http://localhost:9000/health || nc -z localhost 9000 || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${PROXY_NETWORK:-dokploy-network}"
      - "traefik.http.routers.rustfs.rule=Host(`${RUSTFS_DOMAIN:-storage.scryme.tech}`)"
      - "traefik.http.routers.rustfs.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.rustfs.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.services.rustfs.loadbalancer.server.port=9000"
      - "traefik.http.routers.rustfs-console.rule=Host(`${RUSTFS_CONSOLE_DOMAIN:-storage-console.scryme.tech}`)"
      - "traefik.http.routers.rustfs-console.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.rustfs-console.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.services.rustfs-console.loadbalancer.server.port=9001"

  mailpit:
    image: axllent/mailpit
    restart: always
    networks:
      - scryme-prod-network
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${PROXY_NETWORK:-dokploy-network}"
      - "traefik.http.routers.mailpit.rule=Host(`${MAILPIT_HOST:-mail.scryme.tech}`)"
      - "traefik.http.routers.mailpit.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.mailpit.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.services.mailpit.loadbalancer.server.port=8025"
    # SMTP (1025) is only needed internally by the other services on
    # scryme-prod-network, so it's intentionally not published to the host
    # or routed through the proxy. Uncomment below only if you need
    # external SMTP access for testing.
    # ports:
    #   - "1025:1025"

  loki:
    image: grafana/loki:latest
    restart: always
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./docker/loki/local-config.yaml:/etc/loki/local-config.yaml
      - loki_prod_data:/tmp/loki
    networks:
      - scryme-prod-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3100/ready",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  promtail:
    image: grafana/promtail:latest
    restart: always
    volumes:
      - /var/log:/var/log
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker/promtail/config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - scryme-prod-network

  # --- AUTHENTICATION (ZITADEL) ---
  zitadel-setup:
    image: ghcr.io/zitadel/zitadel:latest
    command: "setup"
    environment:
      - ZITADEL_MASTERKEY=${ZITADEL_MASTERKEY}
      - ZITADEL_DATABASE_POSTGRES_HOST=zitadel-db
      - ZITADEL_DATABASE_POSTGRES_USER=${ZITADEL_DB_USER}
      - ZITADEL_DATABASE_POSTGRES_PASSWORD=${ZITADEL_DB_PASSWORD}
      - ZITADEL_DATABASE_POSTGRES_DATABASE=${ZITADEL_DB_NAME}
      - ZITADEL_DATABASE_POSTGRES_SSL_MODE=disable
    depends_on:
      zitadel-db:
        condition: service_healthy
    networks:
      - scryme-prod-network

  zitadel:
    image: ghcr.io/zitadel/zitadel:latest
    restart: always
    command: "start-noprint"
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      - ZITADEL_MASTERKEY=${ZITADEL_MASTERKEY}
      - ZITADEL_DATABASE_POSTGRES_HOST=zitadel-db
      - ZITADEL_DATABASE_POSTGRES_USER=${ZITADEL_DB_USER}
      - ZITADEL_DATABASE_POSTGRES_PASSWORD=${ZITADEL_DB_PASSWORD}
      - ZITADEL_DATABASE_POSTGRES_DATABASE=${ZITADEL_DB_NAME}
      - ZITADEL_DATABASE_POSTGRES_SSL_MODE=disable
      - ZITADEL_EXTERNALDOMAIN=${ZITADEL_DOMAIN:-auth.scryme.tech}
      - ZITADEL_EXTERNALPORT=443
      - ZITADEL_EXTERNALSECURE=true
    depends_on:
      zitadel-setup:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/debug/healthz",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - scryme-prod-network
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${PROXY_NETWORK:-dokploy-network}"
      - "traefik.http.routers.zitadel.rule=Host(`${ZITADEL_DOMAIN:-auth.scryme.tech}`)"
      - "traefik.http.routers.zitadel.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.zitadel.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.services.zitadel.loadbalancer.server.port=8080"
      - "traefik.http.services.zitadel.loadbalancer.server.scheme=h2c"

  # --- AUTOMATION (WINDMILL) ---
  windmill-server:
    image: ghcr.io/windmill-labs/windmill:latest
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      - DATABASE_URL=postgres://${WINDMILL_DB_USER}:${WINDMILL_DB_PASSWORD}@windmill-db:5432/${WINDMILL_DB_NAME}?sslmode=disable
      - MODE=server
    depends_on:
      windmill-db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8000/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - scryme-prod-network
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${PROXY_NETWORK:-dokploy-network}"
      - "traefik.http.routers.windmill.rule=Host(`${WINDMILL_DOMAIN:-windmill.scryme.tech}`)"
      - "traefik.http.routers.windmill.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.windmill.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.services.windmill.loadbalancer.server.port=8000"

  windmill-worker:
    image: ghcr.io/windmill-labs/windmill:latest
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      - DATABASE_URL=postgres://${WINDMILL_DB_USER}:${WINDMILL_DB_PASSWORD}@windmill-db:5432/${WINDMILL_DB_NAME}?sslmode=disable
      - MODE=worker
    depends_on:
      - windmill-server
    networks:
      - scryme-prod-network

  # --- APPLICATIONS ---
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: scryme-api:latest
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:${API_PORT:-4000}/api/v2/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: ${RABBITMQ_URL}
      PORT: ${API_PORT:-4000}
      NODE_ENV: production
      REALTIME_PROVIDER: socketio
      SOCKET_URL: https://${API_DOMAIN:-api.scryme.tech}
      ZITADEL_API_URL: https://${ZITADEL_DOMAIN:-auth.scryme.tech}
      ZITADEL_CLIENT_ID: ${ZITADEL_CLIENT_ID}
      ZITADEL_ORG_ID: ${ZITADEL_ORG_ID}
      ZITADEL_PROJECT_ID: ${ZITADEL_PROJECT_ID}
      JWT_SECRET: ${JWT_SECRET}
      WINDMILL_BASE_URL: http://windmill-server:8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      zitadel:
        condition: service_healthy
    networks:
      - scryme-prod-network
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${PROXY_NETWORK:-dokploy-network}"
      - "traefik.http.routers.api.rule=Host(`${API_DOMAIN:-api.scryme.tech}`)"
      - "traefik.http.routers.api.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.api.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.services.api.loadbalancer.server.port=${API_PORT:-4000}"
      - "logging_job=api"

  crm:
    build:
      context: .
      dockerfile: apps/crm/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://${API_DOMAIN:-api.scryme.tech}
        BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
    image: scryme-crm:latest
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:${CRM_PORT:-3001}/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}}
      NEXT_PUBLIC_API_URL: https://${API_DOMAIN:-api.scryme.tech}
      NEXT_PUBLIC_REALTIME_PROVIDER: socketio
      NEXT_PUBLIC_SOCKET_URL: https://${API_DOMAIN:-api.scryme.tech}
      PORT: ${CRM_PORT:-3001}
      NODE_ENV: production
      ZITADEL_API_URL: https://${ZITADEL_DOMAIN:-auth.scryme.tech}
      ZITADEL_CLIENT_ID: ${ZITADEL_CLIENT_ID}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - scryme-prod-network
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${PROXY_NETWORK:-dokploy-network}"
      - "traefik.http.routers.crm.rule=Host(`${CRM_DOMAIN:-crm.scryme.tech}`)"
      - "traefik.http.routers.crm.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.crm.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.services.crm.loadbalancer.server.port=${CRM_PORT:-3001}"
      - "logging_job=crm"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://${API_DOMAIN:-api.scryme.tech}
        BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
    image: scryme-web:latest
    restart: always
    deploy:
      resources:
        limits:
          memory: 768M
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:${WEB_PORT:-3000}/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}}
      NEXT_PUBLIC_API_URL: https://${API_DOMAIN:-api.scryme.tech}
      NEXT_PUBLIC_REALTIME_PROVIDER: socketio
      NEXT_PUBLIC_SOCKET_URL: https://${API_DOMAIN:-api.scryme.tech}
      PORT: ${WEB_PORT:-3000}
      NODE_ENV: production
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - scryme-prod-network
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${PROXY_NETWORK:-dokploy-network}"
      - "traefik.http.routers.web.rule=Host(`${WEB_DOMAIN:-scryme.tech}`)"
      - "traefik.http.routers.web.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.web.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.services.web.loadbalancer.server.port=${WEB_PORT:-3000}"
      - "logging_job=web"

  bakery:
    build:
      context: .
      dockerfile: apps/bakery/Dockerfile
    image: scryme-bakery:latest
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:${BAKERY_PORT:-3003}/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    environment:
      VITE_API_URL: https://${API_DOMAIN:-api.scryme.tech}
      PORT: ${BAKERY_PORT:-3003}
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    networks:
      - scryme-prod-network
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${PROXY_NETWORK:-dokploy-network}"
      - "traefik.http.routers.bakery.rule=Host(`${BAKERY_DOMAIN:-bakery.scryme.tech}`)"
      - "traefik.http.routers.bakery.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.bakery.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.services.bakery.loadbalancer.server.port=${BAKERY_PORT:-3003}"
      - "logging_job=bakery"

  portal:
    build:
      context: .
      dockerfile: apps/portal/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://${API_DOMAIN:-api.scryme.tech}
        BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
    image: scryme-portal:latest
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:${PORTAL_PORT:-3006}/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}}
      NEXT_PUBLIC_API_URL: https://${API_DOMAIN:-api.scryme.tech}
      NEXT_PUBLIC_APP_URL: https://${PORTAL_DOMAIN:-portal.scryme.tech}
      PORT: ${PORTAL_PORT:-3006}
      NODE_ENV: production
      ZITADEL_API_URL: https://${ZITADEL_DOMAIN:-auth.scryme.tech}
      ZITADEL_CLIENT_ID: ${ZITADEL_CLIENT_ID}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - scryme-prod-network
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${PROXY_NETWORK:-dokploy-network}"
      - "traefik.http.routers.portal.rule=Host(`${PORTAL_DOMAIN:-portal.scryme.tech}`)"
      - "traefik.http.routers.portal.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.portal.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.services.portal.loadbalancer.server.port=${PORTAL_PORT:-3006}"
      - "logging_job=portal"

volumes:
  postgres_prod_data:
  zitadel_data:
  windmill_data:
  redis_prod_data:
  rabbitmq_prod_data:
  rustfs_prod_data:
  loki_prod_data:

networks:
  # Internal network for service-to-service traffic (db, redis, rabbitmq, etc.)
  # Not reachable from outside the host.
  scryme-prod-network:
    driver: bridge

  # The platform-managed proxy network. Dokploy creates "dokploy-network",
  # Coolify creates "coolify" (check `docker network ls` after installing
  # the platform, or its dashboard, to confirm the exact name) — set
  # PROXY_NETWORK in your .env to match. It must already exist; that's why
  # it's marked external rather than created here.
  proxy:
    name: ${PROXY_NETWORK:-dokploy-network}
    external: true
