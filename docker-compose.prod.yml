services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dbuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dbpassword}
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - scryme-prod-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_prod_data:/data
    networks:
      - scryme-prod-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    volumes:
      - rabbitmq_prod_data:/var/lib/rabbitmq
    networks:
      - scryme-prod-network

  api:
    image: scryme-api:latest # Use locally built image or registry path
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
      PORT: 4000
      NODE_ENV: production
      ZITADEL_API_URL: ${ZITADEL_API_URL}
      ZITADEL_CLIENT_ID: ${ZITADEL_CLIENT_ID}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    networks:
      - scryme-prod-network

  crm:
    image: scryme-crm:latest
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      PORT: 3001
      NODE_ENV: production
      ZITADEL_API_URL: ${ZITADEL_API_URL}
      ZITADEL_CLIENT_ID: ${ZITADEL_CLIENT_ID}
    depends_on:
      - api
    networks:
      - scryme-prod-network

  web:
    image: scryme-web:latest
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      PORT: 3000
      NODE_ENV: production
    depends_on:
      - api
    networks:
      - scryme-prod-network

volumes:
  postgres_prod_data:
  redis_prod_data:
  rabbitmq_prod_data:

networks:
  scryme-prod-network:
    driver: bridge
