name: Pipeline

on:
  push:
    branches: [main, dev, nextgen]
  pull_request:
    branches: [main, dev, nextgen]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      pos: ${{ steps.changes.outputs.pos }}
      pos_rust: ${{ steps.changes.outputs.pos_rust }}
      bakery: ${{ steps.changes.outputs.bakery }}
      bakery_rust: ${{ steps.changes.outputs.bakery_rust }}
      api: ${{ steps.changes.outputs.api }}
      crm: ${{ steps.changes.outputs.crm }}
      web: ${{ steps.changes.outputs.web }}
      packages: ${{ steps.changes.outputs.packages }}
      workflow: ${{ steps.changes.outputs.workflow }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            pos:
              - 'apps/pos/**'
            pos_rust:
              - 'apps/pos/src-tauri/**'
            bakery:
              - 'apps/bakery/**'
            bakery_rust:
              - 'apps/bakery/src-tauri/**'
            api:
              - 'apps/api/**'
            crm:
              - 'apps/crm/**'
            web:
              - 'apps/web/**'
            packages:
              - 'packages/**'
            workflow:
              - '.github/workflows/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'

  # This job will only run if we need to do any non-rust validation
  validation-needed:
    needs: filter
    runs-on: ubuntu-latest
    outputs:
      needed: ${{ steps.check.outputs.needed }}
    steps:
      - id: check
        run: |
          if [ "${{ needs.filter.outputs.pos }}" == "true" ] || \
             [ "${{ needs.filter.outputs.bakery }}" == "true" ] || \
             [ "${{ needs.filter.outputs.api }}" == "true" ] || \
             [ "${{ needs.filter.outputs.crm }}" == "true" ] || \
             [ "${{ needs.filter.outputs.web }}" == "true" ] || \
             [ "${{ needs.filter.outputs.packages }}" == "true" ] || \
             [ "${{ needs.filter.outputs.workflow }}" == "true" ]; then
            echo "needed=true" >> $GITHUB_OUTPUT
          else
            echo "needed=false" >> $GITHUB_OUTPUT
          fi

  lint-typecheck:
    needs: [filter, validation-needed]
    if: needs.validation-needed.outputs.needed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm generate

      - name: Turbo Cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-lint-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-lint-

      - name: Lint and Type Check
        run: |
          if [ "${{ needs.filter.outputs.workflow }}" == "true" ]; then
            pnpm turbo lint type-check
          else
            FILTER=""
            if [ "${{ needs.filter.outputs.pos }}" == "true" ]; then FILTER="$FILTER --filter=pos..."; fi
            if [ "${{ needs.filter.outputs.bakery }}" == "true" ]; then FILTER="$FILTER --filter=bakery..."; fi
            if [ "${{ needs.filter.outputs.api }}" == "true" ]; then FILTER="$FILTER --filter=api..."; fi
            if [ "${{ needs.filter.outputs.crm }}" == "true" ]; then FILTER="$FILTER --filter=crm..."; fi
            if [ "${{ needs.filter.outputs.web }}" == "true" ]; then FILTER="$FILTER --filter=web..."; fi
            if [ "${{ needs.filter.outputs.packages }}" == "true" ]; then FILTER="$FILTER --filter=@repo/*..."; fi

            if [ -n "$FILTER" ]; then
              pnpm turbo lint type-check $FILTER
            else
              echo "No JS/TS changes detected, skipping lint and type-check"
            fi
          fi
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres

  rust-pos:
    needs: filter
    if: needs.filter.outputs.pos_rust == 'true' || needs.filter.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/pos/src-tauri
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            libudev-dev libusb-1.0-0-dev libpcsclite-dev pkg-config patchelf
      - name: Create dummy binaries
        run: |
          mkdir -p apps/pos/src-tauri/binaries
          touch apps/pos/src-tauri/binaries/sumatrapdf-x86_64-unknown-linux-gnu
          chmod +x apps/pos/src-tauri/binaries/*
      - name: Lint Backend
        run: cd apps/pos && pnpm lint:backend
      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@cargo-tarpaulin
      - name: Test Backend
        run: cd apps/pos/src-tauri && cargo tarpaulin --ignore-tests --out Xml

  rust-bakery:
    needs: filter
    if: needs.filter.outputs.bakery_rust == 'true' || needs.filter.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/bakery/src-tauri
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev \
            libssl-dev libayatana-appindicator3-dev librsvg2-dev pkg-config
      - name: Lint Backend
        run: cd apps/bakery && pnpm lint:backend
      - name: Test Backend
        run: cd apps/bakery && pnpm test:backend

  frontend-tests:
    needs: [filter, validation-needed]
    if: needs.validation-needed.outputs.needed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma Client
        run: pnpm generate
      - name: Run Tests
        run: |
          FILTER=""
          if [ "${{ needs.filter.outputs.pos }}" == "true" ] || [ "${{ needs.filter.outputs.workflow }}" == "true" ]; then
            pnpm --filter pos test:frontend
          fi
          if [ "${{ needs.filter.outputs.api }}" == "true" ] || [ "${{ needs.filter.outputs.workflow }}" == "true" ]; then
            pnpm --filter api test
          fi

  e2e-tests:
    needs: [filter]
    if: needs.filter.outputs.pos == 'true' || (needs.filter.outputs.packages == 'true' && github.event_name == 'push') || needs.filter.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter pos exec playwright install --with-deps
      - name: Run E2E tests
        run: pnpm --filter pos test:e2e
        env:
          POSTHOG_API_KEY: mock
          SENTRY_DSN: mock

  release-management:
    needs: [filter, lint-typecheck, rust-pos, rust-bakery, frontend-tests, e2e-tests, validation-needed]
    # We want this to run even if some jobs were skipped (if they were skipped because no changes)
    # But we want it to FAIL if any of the REQUIRED jobs failed.
    # Jobs that are skipped due to 'if' conditions are considered successful for 'needs'.
    if: |
      always() &&
      (needs.lint-typecheck.result == 'success' || needs.lint-typecheck.result == 'skipped') &&
      (needs.rust-pos.result == 'success' || needs.rust-pos.result == 'skipped') &&
      (needs.rust-bakery.result == 'success' || needs.rust-bakery.result == 'skipped') &&
      (needs.frontend-tests.result == 'success' || needs.frontend-tests.result == 'skipped') &&
      (needs.e2e-tests.result == 'success' || needs.e2e-tests.result == 'skipped') &&
      github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/nextgen')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Enter Prerelease Mode (dev/nextgen only)
        if: github.ref != 'refs/heads/main'
        run: |
          if [ ! -f .changeset/pre.json ]; then
            pnpm changeset pre enter ${{ github.ref_name }}
          fi
      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset version && ./scripts/sync-tauri-version.sh
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  set-version:
    needs: [filter, release-management]
    if: needs.release-management.outputs.published == 'true' && (needs.filter.outputs.pos == 'true' || needs.filter.outputs.workflow == 'true')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: get-version
        run: echo "version=$(jq -r .version apps/pos/package.json)" >> $GITHUB_OUTPUT

  publish-tauri:
    needs: [filter, release-management, set-version]
    if: needs.release-management.outputs.published == 'true'
    strategy:
      fail-fast: false
      matrix:
        target_group: [macos-arm, macos-x86, ubuntu, windows]
        variant: [retail, standalone, restaurant, supermarket, pharmacy]
        include:
          - target_group: macos-arm
            os: macos-latest
            args: '--target aarch64-apple-darwin'
          - target_group: macos-x86
            os: macos-latest
            args: '--target x86_64-apple-darwin'
          - target_group: ubuntu
            os: ubuntu-22.04
            args: ''
          - target_group: windows
            os: windows-latest
            args: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './apps/pos/src-tauri -> target'
      - name: install dependencies (ubuntu only)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libudev-dev libusb-1.0-0-dev libgtk-3-dev libpcsclite-dev pkg-config
      - name: install dependencies
        run: pnpm install --frozen-lockfile
      - name: Create dummy binaries for macOS/Linux
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p apps/pos/src-tauri/binaries
          touch apps/pos/src-tauri/binaries/sumatrapdf-x86_64-apple-darwin
          touch apps/pos/src-tauri/binaries/sumatrapdf-aarch64-apple-darwin
          touch apps/pos/src-tauri/binaries/sumatrapdf-x86_64-unknown-linux-gnu
          chmod +x apps/pos/src-tauri/binaries/*
      - name: Create dummy binaries for Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path apps/pos/src-tauri/binaries
          if (!(Test-Path "apps/pos/src-tauri/binaries/sumatrapdf-x86_64-pc-windows-msvc.exe")) {
            New-Item -ItemType File -Path "apps/pos/src-tauri/binaries/sumatrapdf-x86_64-pc-windows-msvc.exe"
          }
          if (!(Test-Path "apps/pos/src-tauri/binaries/sumatrapdf-i686-pc-windows-msvc.exe")) {
            New-Item -ItemType File -Path "apps/pos/src-tauri/binaries/sumatrapdf-i686-pc-windows-msvc.exe"
          }
      - name: Update Version and Updater for Build
        shell: bash
        run: |
          FULL_VERSION="${{ needs.set-version.outputs.version }}"
          BRANCH="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          VARIANT="${{ matrix.variant }}"
          OS="${{ matrix.os }}"
          if [ "$VARIANT" = "retail" ]; then
            CONFIG_FILE="apps/pos/src-tauri/tauri.retail.conf.json"
            UPDATER_NAME="latest"
          else
            CONFIG_FILE="apps/pos/src-tauri/tauri.$VARIANT.conf.json"
            UPDATER_NAME="latest-$VARIANT"
          fi
          if [ "$BRANCH" = "main" ]; then
            UPDATER_ENDPOINT="https://github.com/$REPO/releases/latest/download/$UPDATER_NAME.json"
          elif [ "$BRANCH" = "dev" ]; then
            UPDATER_ENDPOINT="https://github.com/$REPO/releases/download/dev-latest/$UPDATER_NAME.json"
          elif [ "$BRANCH" = "nextgen" ]; then
            UPDATER_ENDPOINT="https://github.com/$REPO/releases/download/nextgen-latest/$UPDATER_NAME.json"
          else
             UPDATER_ENDPOINT="https://github.com/$REPO/releases/latest/download/$UPDATER_NAME.json"
          fi
          if [[ "$OS" == "windows-latest" && "$FULL_VERSION" == *"-"* ]]; then
            VERSION_BASE=$(echo "$FULL_VERSION" | cut -d'-' -f1)
            PRE_RELEASE=$(echo "$FULL_VERSION" | cut -d'-' -f2-)
            NUMERIC_PRE=$(echo "$PRE_RELEASE" | grep -oE '[0-9]+(\.[0-9]+)*' | tr '\n' '.' | sed 's/\.$//')
            TARGET_VERSION="${VERSION_BASE}-${NUMERIC_PRE:-0}"
          else
            TARGET_VERSION="$FULL_VERSION"
          fi
          jq --arg v "$TARGET_VERSION" '.version = $v' apps/pos/src-tauri/tauri.conf.json > tmp.json && mv tmp.json apps/pos/src-tauri/tauri.conf.json
          jq --arg v "$TARGET_VERSION" \
             --arg e "$UPDATER_ENDPOINT" \
             --arg var "$VARIANT" \
             --arg os "$OS" \
             '
             .version = $v |
             (if $var != "standalone" then .plugins.updater.endpoints = [$e] else . end) |
             (if $os == "windows-latest" then .bundle.targets = ["nsis"] else . end)
             ' "$CONFIG_FILE" > tmp.json && mv tmp.json "$CONFIG_FILE"
      - name: Generate .env file for build
        shell: bash
        run: |
          echo "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" >> apps/pos/src-tauri/.env
          echo "POSTHOG_API_KEY=${{ secrets.POSTHOG_API_KEY }}" >> apps/pos/src-tauri/.env
          echo "POSTHOG_HOST=${{ secrets.POSTHOG_HOST }}" >> apps/pos/src-tauri/.env
      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ needs.set-version.outputs.version }}
          releaseDraft: false
          prerelease: ${{ github.ref != 'refs/heads/main' }}
          args: ${{ matrix.args }} ${{ matrix.variant == 'retail' && '--config apps/pos/src-tauri/tauri.retail.conf.json --features retail' || format('--config apps/pos/src-tauri/tauri.{0}.conf.json --features {0}', matrix.variant) }}
          projectPath: apps/pos
      - name: Extract latest.json
        if: matrix.variant != 'standalone'
        shell: bash
        run: |
          LATEST_JSON=$(find apps/pos/src-tauri/target -name "latest.json" | head -n 1)
          if [ -z "$LATEST_JSON" ]; then
            LATEST_JSON=$(find apps/pos -name "latest.json" | head -n 1)
          fi
          if [ -n "$LATEST_JSON" ]; then
            cp "$LATEST_JSON" "latest-${{ matrix.variant }}-${{ matrix.target_group }}.json"
          else
            echo "latest.json not found for ${{ matrix.os }} ${{ matrix.variant }}"
            exit 1
          fi
      - name: Upload latest.json artifact
        if: matrix.variant != 'standalone'
        uses: actions/upload-artifact@v4
        with:
          name: latest-json-${{ matrix.variant }}-${{ matrix.target_group }}
          path: latest-${{ matrix.variant }}-${{ matrix.target_group }}.json

  finalize-release:
    needs: [publish-tauri, set-version]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        variant: [retail, restaurant, supermarket, pharmacy]
    steps:
      - uses: actions/checkout@v4
      - name: Download all latest.json artifacts for ${{ matrix.variant }}
        if: matrix.variant != 'standalone'
        uses: actions/download-artifact@v4
        with:
          pattern: latest-json-${{ matrix.variant }}-*
          merge-multiple: true
      - name: Merge latest.json files for ${{ matrix.variant }}
        if: matrix.variant != 'standalone'
        shell: bash
        run: |
          VERSION="${{ needs.set-version.outputs.version }}"
          REPO="${{ github.repository }}"
          TAG="v$VERSION"
          VARIANT="${{ matrix.variant }}"
          if [ "$VARIANT" = "retail" ]; then
            FINAL_NAME="latest.json"
          else
            FINAL_NAME="latest-$VARIANT.json"
          fi
          FILES=(latest-${VARIANT}-*.json)
          if [ ${#FILES[@]} -eq 0 ]; then
             echo "No artifacts found for $VARIANT"
             exit 1
          fi
          jq -s 'reduce .[] as $item ({}; . * $item)' "${FILES[@]}" > "$FINAL_NAME"
          jq --arg repo "$REPO" --arg tag "$TAG" '
            .platforms |= with_entries(
              .value.url |= (
                sub(".*/"; "https://github.com/\($repo)/releases/download/\($tag)/")
              )
            )
          ' "$FINAL_NAME" > tmp.json && mv tmp.json "$FINAL_NAME"
      - name: Upload final latest JSON to release
        if: matrix.variant != 'standalone'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION="${{ needs.set-version.outputs.version }}"
          TAG="v$VERSION"
          VARIANT="${{ matrix.variant }}"
          FINAL_NAME=$([ "$VARIANT" = "retail" ] && echo "latest.json" || echo "latest-$VARIANT.json")
          gh release upload "$TAG" "$FINAL_NAME" --clobber
      - name: Update Rolling Latest Release (Prerelease only)
        if: github.ref != 'refs/heads/main' && matrix.variant != 'standalone'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          BRANCH="${{ github.ref_name }}"
          TAG="${BRANCH}-latest"
          VARIANT="${{ matrix.variant }}"
          FINAL_NAME=$([ "$VARIANT" = "retail" ] && echo "latest.json" || echo "latest-$VARIANT.json")
          gh release view "$TAG" || gh release create "$TAG" --prerelease --title "$TAG" --notes "Rolling release for $BRANCH branch"
          gh release upload "$TAG" "$FINAL_NAME" --clobber
