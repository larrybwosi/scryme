name: Bakery Pre-release

on:
  push:
    branches:
      - dev
    paths:
      - 'apps/bakery/**'
      - 'packages/sdk/**'
      - 'packages/ui/**'
      - 'packages/shared/**'
      - '.github/workflows/bakery-pre-release.yml'

jobs:
  build:
    name: Release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/bakery/src-tauri

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Apply dev version suffix
        shell: bash
        run: |
          cd apps/bakery
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          # Use run_number to ensure unique versions/tags for dev builds
          # For MSI targets, the pre-release identifier must be numeric-only.
          DEV_VERSION="${VERSION}-${{ github.run_number }}"

          # Update package.json
          jq ".version = \"$DEV_VERSION\"" package.json > package.json.tmp && mv package.json.tmp package.json

          # Update tauri.conf.json
          jq ".version = \"$DEV_VERSION\"" src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp && mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json

          echo "Applied version: $DEV_VERSION"

      - name: Inject Environment Variables
        shell: bash
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://api.scryme.app/api/v2' }}
          BAKERY_UPDATE_URL: ${{ secrets.BAKERY_UPDATE_URL || 'https://api.scryme.app/api/v2/bakery/update/{{target}}/{{current_version}}' }}
          TAURI_PUBLIC_KEY: ${{ secrets.TAURI_PUBLIC_KEY || 'dW51c2VkX3B1YmxpY19rZXlfZm9yX2J1aWxkX3ZlcmlmaWNhdGlvbg==' }}
        run: |
          # Inject VITE_API_URL into .env for the frontend build
          echo "VITE_API_URL=$VITE_API_URL" > apps/bakery/.env

          # Replace the update URL and public key in tauri.conf.json
          # Use node for cross-platform JSON editing
          node -e "
            const fs = require('cookie/node_modules/fs'); // This might not work if cookie isn't there, better use standard fs
          " || true # Placeholder to test if I can just use a simple node script

          # Actually let's use a simpler node script without dependencies
          node -e "
            const fs = require('fs');
            const path = 'apps/bakery/src-tauri/tauri.conf.json';
            const config = JSON.parse(fs.readFileSync(path, 'utf8'));
            config.plugins.updater.endpoints = [process.env.BAKERY_UPDATE_URL];
            config.plugins.updater.pubkey = process.env.TAURI_PUBLIC_KEY;
            fs.writeFileSync(path, JSON.stringify(config, null, 2));
          "

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://api.scryme.app/api/v2' }}
        with:
          tagName: ${{ github.event_name == 'push' && 'v__VERSION__' || '' }}
          releaseName: 'Dealio Bakery v__VERSION__'
          releaseBody: 'Pre-release build for development.'
          prerelease: true
          projectPath: apps/bakery

  upload-updater-json:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create dev.latest.json
        shell: bash
        run: |
          VERSION=$(jq -r '.version' apps/bakery/src-tauri/tauri.conf.json)
          DEV_VERSION="${VERSION}-${{ github.run_number }}"
          echo "{\"version\": \"v$DEV_VERSION\", \"notes\": \"Pre-release build\", \"pub_date\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\", \"platforms\": {}}" > dev.latest.json
          echo "TAG_NAME=v$DEV_VERSION" >> $GITHUB_ENV

      - name: Upload dev.latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          files: dev.latest.json
          tag_name: ${{ env.TAG_NAME }}
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
