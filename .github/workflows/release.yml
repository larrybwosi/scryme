name: Release and Publish

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  # 1. Manages Changesets, bumps version tags on main, or falls back to traditional changeset publish
  release-management:
    name: Release Management
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.auto-version.outputs.published }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Check for Changesets and Version/Publish
        id: auto-version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if [ -d ".changeset" ] && [ "$(ls -A .changeset/*.md 2>/dev/null)" ]; then
            echo "Changesets found. Bumping versions..."
            pnpm version-packages

            NEW_VERSION=$(node -p "require('./apps/pos/package.json').version")
            TAG="v$NEW_VERSION"

            git add .
            git commit -m "chore(release): version packages $TAG [skip ci]"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin main --follow-tags

            echo "published=true" >> $GITHUB_OUTPUT
          else
            echo "No changesets found. Proceeding with standard build."
            echo "published=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to Changesets (if applicable)
        if: steps.auto-version.outputs.published != 'true'
        uses: changesets/action@v1
        with:
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Quick helper to extract version for multi-platform app matrix
  set-version:
    name: Set Version Output
    runs-on: ubuntu-latest
    needs: release-management
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: get-version
        run: |
          VERSION=$(node -p "require('./apps/pos/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  # 2. Builds and Publishes POS to GitHub Releases (Matrix parallelization)
  publish-pos:
    name: Publish POS (${{ matrix.os }} - ${{ matrix.variant }})
    runs-on: ${{ matrix.os }}
    needs: [release-management, set-version]
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        variant: [pharmacy, retail, standalone, supermarket, restaurant]
        include:
          - os: windows-latest
            args: --target x86_64-pc-windows-msvc
          - os: ubuntu-latest
            args: --target x86_64-unknown-linux-gnu
          - variant: retail
            features: retail
          - variant: standalone
            features: standalone
          - variant: restaurant
            features: restaurant
          - variant: supermarket
            features: supermarket
          - variant: pharmacy
            features: pharmacy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install System Dependencies (Linux Only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libglib2.0-dev

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build and Publish POS App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET || 'secret' }}
          VITE_BUSINESS_MODE: ${{ matrix.variant }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
        with:
          projectPath: ./apps/pos
          tagName: v${{ needs.set-version.outputs.version }}
          releaseName: "v${{ needs.set-version.outputs.version }}"
          releaseBody: "Release v${{ needs.set-version.outputs.version }}"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }} --config src-tauri/tauri.${{ matrix.variant }}.conf.json --features ${{ matrix.features }}

  # 3. Builds and Publishes Bakery App (Matrix parallelization)
  publish-bakery:
    name: Publish Bakery App (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [release-management, set-version]
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        include:
          - os: windows-latest
            args: --target x86_64-pc-windows-msvc
          - os: ubuntu-latest
            args: --target x86_64-unknown-linux-gnu
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install System Dependencies (Linux Only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libglib2.0-dev

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build and Publish Bakery App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET || 'secret' }}
        with:
          projectPath: ./apps/bakery
          tagName: v${{ needs.set-version.outputs.version }}
          releaseName: "v${{ needs.set-version.outputs.version }}"
          releaseBody: "Release v${{ needs.set-version.outputs.version }}"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # 4. Builds Docker Images (Runs in parallel with steps 2 & 3)
  docker-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [release-management]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Convert repository name to lowercase
        id: repo-lower
        run: |
          echo "repo_lower=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Get current version
        id: get-version
        run: |
          VERSION=$(node -p "require('./apps/pos/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push Docker images
        uses: docker/bake-action@v7
        with:
          files: |
            ./docker-bake.hcl
          targets: pos,bakery
          push: true
          set: |
            *.args.NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            *.args.BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET || 'secret' }}
            REPO_LOWER=${{ steps.repo-lower.outputs.repo_lower }}
            VERSION=${{ steps.get-version.outputs.version }}