name: Release and Publish

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  # 1. Manages Changesets, bumps version tags on main, or falls back to traditional changeset publish
  release-management:
    name: Release Management
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.auto-version.outputs.published }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Check for Changesets and Version/Publish
        id: auto-version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if [ -d ".changeset" ] && [ "$(ls -A .changeset/*.md 2>/dev/null)" ]; then
            echo "Changesets found. Bumping versions..."
            pnpm version-packages

            NEW_VERSION=$(node -p "require('./apps/pos/package.json').version")
            TAG="v$NEW_VERSION"

            git add .
            git commit -m "chore(release): version packages $TAG [skip ci]"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin main --follow-tags

            echo "published=true" >> $GITHUB_OUTPUT
          else
            echo "No changesets found. Proceeding with standard build."
            echo "published=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to Changesets (if applicable)
        if: steps.auto-version.outputs.published != 'true'
        uses: changesets/action@v1
        with:
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Quick helper to extract version for multi-platform app matrix
  set-version:
    name: Set Version Output
    runs-on: ubuntu-latest
    needs: release-management
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: get-version
        run: |
          VERSION=$(node -p "require('./apps/pos/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  # 2. Builds and Publishes POS to GitHub Releases (Matrix parallelization)
  publish-pos:
    name: Publish POS (${{ matrix.target_group }} - ${{ matrix.variant }})
    runs-on: ${{ matrix.os }}
    needs: [release-management, set-version]
    strategy:
      fail-fast: false
      matrix:
        target_group: [desktop-windows, desktop-macos, desktop-linux, mobile]
        variant: [internal, alpha, beta, production, enterprise]
        include:
          - target_group: desktop-windows
            os: windows-latest
            args: --target x86_64-pc-windows-msvc
          - target_group: desktop-macos
            os: macos-latest
            args: --target x86_64-apple-darwin
          - target_group: desktop-linux
            os: ubuntu-latest
            args: --target x86_64-unknown-linux-gnu
          - target_group: mobile
            os: ubuntu-latest
            args: ""
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build and Publish POS App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET || 'secret' }}
        with:
          projectPath: ./apps/pos
          tagName: v${{ needs.set-version.outputs.version }}
          releaseName: "v${{ needs.set-version.outputs.version }}"
          releaseBody: "Release v${{ needs.set-version.outputs.version }}"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # 3. Builds and Publishes Bakery App (Matrix parallelization)
  publish-bakery:
    name: Publish Bakery App (${{ matrix.platform }})
    runs-on: ubuntu-latest
    needs: [release-management, set-version]
    strategy:
      fail-fast: false
      matrix:
        platform: [android, ios]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Bakery App Bundle
        run: |
          cd apps/bakery
          pnpm build
          zip -r bakery-${{ matrix.platform }}.zip dist/

      - name: Upload to Release Artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ needs.set-version.outputs.version }}
        run: |
          FINAL_NAME="bakery-${{ matrix.platform }}-${{ env.TAG }}.zip"
          mv apps/bakery/bakery-${{ matrix.platform }}.zip "$FINAL_NAME"

          gh release create "$TAG" --title "$TAG" --notes "Release $TAG" || true
          gh release upload "$TAG" "$FINAL_NAME" --clobber

  # 4. Builds Docker Images (Runs in parallel with steps 2 & 3)
  docker-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [release-management] # Stripped 'set-version' out to run side-by-side with application builds
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Convert repository name to lowercase
        run: |
          echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Get current version
        id: get-version
        run: |
          VERSION=$(node -p "require('./apps/pos/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push Docker images
        uses: docker/bake-action@v4
        with:
          files: |
            ./docker-bake.hcl
          targets: pos,bakery # Docker Buildx Bake compiles both targets concurrently on the runner
          push: true
          set: |
            *.args.NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            *.args.BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET || 'secret' }}
            REPO_LOWER=${{ env.REPO_LOWER }}
            VERSION=${{ steps.get-version.outputs.version }}
