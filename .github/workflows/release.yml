name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "10.34.1"
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Turbo Cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Lint
        run: pnpm lint
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres

      - name: Type Check
        run: pnpm type-check
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres

      - name: Run POS Frontend Tests
        run: pnpm --filter dealio-desktop test:frontend

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install POS Backend dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libudev-dev \
            libusb-1.0-0-dev \
            libpcsclite-dev \
            pkg-config \
            patchelf

      - name: Create POS dummy binaries
        run: |
          mkdir -p apps/pos/src-tauri/binaries
          touch apps/pos/src-tauri/binaries/sumatrapdf-x86_64-apple-darwin
          touch apps/pos/src-tauri/binaries/sumatrapdf-aarch64-apple-darwin
          touch apps/pos/src-tauri/binaries/sumatrapdf-x86_64-unknown-linux-gnu
          chmod +x apps/pos/src-tauri/binaries/*

      - name: Run POS Backend Linting
        run: pnpm --filter dealio-desktop lint:backend

      - name: Run POS Backend Tests with Coverage
        run: |
          cargo install cargo-tarpaulin
          cargo tarpaulin --ignore-tests --manifest-path apps/pos/src-tauri/Cargo.toml --out Xml

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter dealio-desktop exec playwright install --with-deps

      - name: Run POS E2E tests
        run: pnpm --filter dealio-desktop test:e2e
        env:
          POSTHOG_API_KEY: mock
          SENTRY_DSN: mock

  release-management:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      published: ${{ steps.auto-version.outputs.published == 'true' || steps.changesets.outputs.published == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Automatic Versioning (on main)
        id: auto-version
        if: github.ref == 'refs/heads/main'
        run: |
          CHANGESETS=$(find .changeset -name "*.md" | grep -v "README.md" | wc -l)
          if [ "$CHANGESETS" -gt 0 ]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"

            chmod +x ./scripts/sync-tauri-version.sh
            pnpm version-packages
            pnpm install --lockfile-only

            VERSION=$(jq -r .version apps/pos/package.json)
            TAG="v$VERSION"

            git add .
            git commit -m "chore: release $TAG [skip ci]"
            git tag "$TAG"
            git push origin main --follow-tags

            echo "published=true" >> $GITHUB_OUTPUT
          else
            echo "published=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release Pull Request or Publish
        id: changesets
        if: steps.auto-version.outputs.published != 'true'
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  set-version:
    needs: [release-management]
    if: needs.release-management.outputs.published == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - id: get-version
        run: echo "version=$(jq -r .version apps/pos/package.json)" >> $GITHUB_OUTPUT

  publish-pos:
    needs: [release-management, set-version]
    if: needs.release-management.outputs.published == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        target_group: [macos-arm, macos-x86, ubuntu, windows]
        variant: [retail, standalone, restaurant, supermarket, pharmacy]
        include:
          - target_group: macos-arm
            os: macos-latest
            args: "--target aarch64-apple-darwin"
          - target_group: macos-x86
            os: macos-latest
            args: "--target x86_64-apple-darwin"
          - target_group: ubuntu
            os: ubuntu-22.04
            args: ""
          - target_group: windows
            os: windows-latest
            args: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: pnpm/action-setup@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./apps/pos/src-tauri -> target"
      - name: install dependencies (ubuntu only)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libudev-dev libusb-1.0-0-dev libgtk-3-dev libpcsclite-dev pkg-config
      - name: install dependencies
        run: pnpm install --frozen-lockfile
      - name: Create dummy binaries for macOS/Linux
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p apps/pos/src-tauri/binaries
          touch apps/pos/src-tauri/binaries/sumatrapdf-x86_64-apple-darwin
          touch apps/pos/src-tauri/binaries/sumatrapdf-aarch64-apple-darwin
          touch apps/pos/src-tauri/binaries/sumatrapdf-x86_64-unknown-linux-gnu
          chmod +x apps/pos/src-tauri/binaries/*
      - name: Create dummy binaries for Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path apps/pos/src-tauri/binaries
          if (!(Test-Path "apps/pos/src-tauri/binaries/sumatrapdf-x86_64-pc-windows-msvc.exe")) {
            New-Item -ItemType File -Path "apps/pos/src-tauri/binaries/sumatrapdf-x86_64-pc-windows-msvc.exe"
          }
          if (!(Test-Path "apps/pos/src-tauri/binaries/sumatrapdf-i686-pc-windows-msvc.exe")) {
            New-Item -ItemType File -Path "apps/pos/src-tauri/binaries/sumatrapdf-i686-pc-windows-msvc.exe"
          }
      - name: Update Version and Updater for Build
        shell: bash
        run: |
          FULL_VERSION="${{ needs.set-version.outputs.version }}"
          BRANCH="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          VARIANT="${{ matrix.variant }}"
          OS="${{ matrix.os }}"
          if [ "$VARIANT" = "retail" ]; then
            CONFIG_FILE="apps/pos/src-tauri/tauri.retail.conf.json"
            UPDATER_NAME="latest"
          else
            CONFIG_FILE="apps/pos/src-tauri/tauri.$VARIANT.conf.json"
            UPDATER_NAME="latest-$VARIANT"
          fi
          if [ "$BRANCH" = "main" ]; then
            UPDATER_ENDPOINT="https://github.com/$REPO/releases/latest/download/$UPDATER_NAME.json"
          else
            UPDATER_ENDPOINT="https://github.com/$REPO/releases/download/${BRANCH}-latest/$UPDATER_NAME.json"
          fi
          if [[ "$OS" == "windows-latest" && "$FULL_VERSION" == *"-"* ]]; then
            VERSION_BASE=$(echo "$FULL_VERSION" | cut -d'-' -f1)
            PRE_RELEASE=$(echo "$FULL_VERSION" | cut -d'-' -f2-)
            NUMERIC_PRE=$(echo "$PRE_RELEASE" | grep -oE '[0-9]+(\.[0-9]+)*' | tr '\n' '.' | sed 's/\.$//')
            TARGET_VERSION="${VERSION_BASE}-${NUMERIC_PRE:-0}"
          else
            TARGET_VERSION="$FULL_VERSION"
          fi
          jq --arg v "$TARGET_VERSION" '.version = $v' apps/pos/src-tauri/tauri.conf.json > tmp.json && mv tmp.json apps/pos/src-tauri/tauri.conf.json
          jq --arg v "$TARGET_VERSION" \
             --arg e "$UPDATER_ENDPOINT" \
             --arg var "$VARIANT" \
             --arg os "$OS" \
             '
             .version = $v |
             (if $var != "standalone" then .plugins.updater.endpoints = [$e] else . end) |
             (if $os == "windows-latest" then .bundle.targets = ["nsis"] else . end)
             ' "$CONFIG_FILE" > tmp.json && mv tmp.json "$CONFIG_FILE"
      - name: Generate .env file for build
        shell: bash
        run: |
          echo "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" >> apps/pos/src-tauri/.env
          echo "POSTHOG_API_KEY=${{ secrets.POSTHOG_API_KEY }}" >> apps/pos/src-tauri/.env
          echo "POSTHOG_HOST=${{ secrets.POSTHOG_HOST }}" >> apps/pos/src-tauri/.env
      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ needs.set-version.outputs.version }}
          releaseDraft: false
          prerelease: ${{ github.ref != 'refs/heads/main' }}
          args: ${{ matrix.args }} ${{ matrix.variant == 'retail' && '--config apps/pos/src-tauri/tauri.retail.conf.json --features retail' || format('--config apps/pos/src-tauri/tauri.{0}.conf.json --features {0}', matrix.variant) }}
          projectPath: apps/pos
      - name: Extract latest.json
        if: matrix.variant != 'standalone'
        shell: bash
        run: |
          LATEST_JSON=$(find apps/pos/src-tauri/target -name "latest.json" | head -n 1)
          if [ -z "$LATEST_JSON" ]; then
            LATEST_JSON=$(find apps/pos -name "latest.json" | head -n 1)
          fi
          if [ -n "$LATEST_JSON" ]; then
            cp "$LATEST_JSON" "latest-${{ matrix.variant }}-${{ matrix.target_group }}.json"
          else
            echo "latest.json not found for ${{ matrix.os }} ${{ matrix.variant }}"
            exit 1
          fi
      - name: Upload latest.json artifact
        if: matrix.variant != 'standalone'
        uses: actions/upload-artifact@v4
        with:
          name: latest-json-${{ matrix.variant }}-${{ matrix.target_group }}
          path: latest-${{ matrix.variant }}-${{ matrix.target_group }}.json

  publish-bakery:
    needs: [release-management, set-version]
    if: needs.release-management.outputs.published == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: pnpm/action-setup@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./apps/bakery/src-tauri -> target"
      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - name: install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma Client
        run: pnpm generate
      - name: Build shared packages
        run: |
          pnpm --filter @repo/shared build
          pnpm --filter @repo/sdk build
      - name: Inject Environment Variables
        shell: bash
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://api.scryme.app/api/v2' }}
          BAKERY_UPDATE_URL: ${{ secrets.BAKERY_UPDATE_URL || 'https://api.scryme.app/api/v2/bakery/update/{{target}}/{{current_version}}' }}
          TAURI_PUBLIC_KEY: ${{ secrets.TAURI_PUBLIC_KEY || 'dW51c2VkX3B1YmxpY19rZXlfZm9yX2J1aWxkX3ZlcmlmaWNhdGlvbg==' }}
        run: |
          echo "VITE_API_URL=$VITE_API_URL" > apps/bakery/.env
          node -e "
            const fs = require('fs');
            const path = 'apps/bakery/src-tauri/tauri.conf.json';
            const config = JSON.parse(fs.readFileSync(path, 'utf8'));
            config.plugins.updater.endpoints = [process.env.BAKERY_UPDATE_URL];
            config.plugins.updater.pubkey = process.env.TAURI_PUBLIC_KEY;
            fs.writeFileSync(path, JSON.stringify(config, null, 2));
          "
      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ needs.set-version.outputs.version }}
          releaseDraft: false
          prerelease: ${{ github.ref != 'refs/heads/main' }}
          projectPath: apps/bakery

  docker-images:
    needs: [release-management, set-version]
    if: needs.release-management.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Lowercase repository name
        run: |
          echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/api:latest
            ghcr.io/${{ env.REPO_LOWER }}/api:${{ needs.set-version.outputs.version }}

      - name: Build and push Bakery image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/bakery/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/bakery:latest
            ghcr.io/${{ env.REPO_LOWER }}/bakery:${{ needs.set-version.outputs.version }}

  finalize-release:
    needs: [publish-pos, set-version]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        variant: [retail, restaurant, supermarket, pharmacy]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - name: Download all latest.json artifacts for ${{ matrix.variant }}
        if: matrix.variant != 'standalone'
        uses: actions/download-artifact@v4
        with:
          pattern: latest-json-${{ matrix.variant }}-*
          merge-multiple: true
      - name: Merge latest.json files for ${{ matrix.variant }}
        shell: bash
        run: |
          VERSION="${{ needs.set-version.outputs.version }}"
          REPO="${{ github.repository }}"
          TAG="v$VERSION"
          VARIANT="${{ matrix.variant }}"
          if [ "$VARIANT" = "retail" ]; then
            FINAL_NAME="latest.json"
          else
            FINAL_NAME="latest-$VARIANT.json"
          fi
          FILES=(latest-${VARIANT}-*.json)
          if [ ${#FILES[@]} -eq 0 ]; then
             echo "No artifacts found for $VARIANT"
             exit 1
          fi
          jq -s 'reduce .[] as $item ({}; . * $item)' "${FILES[@]}" > "$FINAL_NAME"
          jq --arg repo "$REPO" --arg tag "$TAG" '
            .platforms |= with_entries(
              .value.url |= (
                sub(".*/"; "https://github.com/\($repo)/releases/download/\($tag)/")
              )
            )
          ' "$FINAL_NAME" > tmp.json && mv tmp.json "$FINAL_NAME"
      - name: Upload final latest JSON to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION="${{ needs.set-version.outputs.version }}"
          TAG="v$VERSION"
          VARIANT="${{ matrix.variant }}"
          FINAL_NAME=$([ "$VARIANT" = "retail" ] && echo "latest.json" || echo "latest-$VARIANT.json")
          gh release upload "$TAG" "$FINAL_NAME" --clobber
