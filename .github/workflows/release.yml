name: Release and Publish

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  # 1. Manages Changesets, bumps version tags on main, or falls back to traditional changeset publish
  release-management:
    name: Release Management
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.auto-version.outputs.published }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Check for Changesets and Version/Publish
        id: auto-version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 1. Apply changesets if they exist
          if [ -d ".changeset" ] && [ "$(ls -A .changeset/*.md 2>/dev/null)" ]; then
            echo "Changesets found. Bumping versions..."
            pnpm version-packages
          else
            echo "No changesets found."
          fi

          # 2. Run our unique version script to ensure version is unique and jump if needed
          echo "Checking version uniqueness and jumping if needed..."
          node scripts/ensure-unique-version.js

          # 3. Retrieve final unique version
          NEW_VERSION=$(node -p "require('./apps/pos/package.json').version")
          TAG="v$NEW_VERSION"
          echo "Final release version: $NEW_VERSION"

          # 4. If there are changes to commit, or if the tag does not exist, push
          if [ -n "$(git status --porcelain)" ]; then
            echo "Changes detected. Committing and pushing..."
            git add .
            git commit -m "chore(release): version packages $TAG [skip ci]"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin main --follow-tags
          else
            echo "No file changes detected."
            # Check if tag already exists on remote origin. If not, create and push it.
            if ! git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
              echo "Tag $TAG does not exist on remote. Tagging and pushing..."
              git tag -a "$TAG" -m "Release $TAG"
              git push origin "$TAG"
            else
              echo "Tag $TAG already exists on remote."
            fi
          fi

          echo "published=true" >> $GITHUB_OUTPUT

      - name: Publish to Changesets (if applicable)
        if: steps.auto-version.outputs.published != 'true'
        uses: changesets/action@v1
        with:
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 2. Centralized package build to be shared across jobs
  build-packages:
    name: Build Packages
    runs-on: ubuntu-latest
    needs: release-management
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Packages
        run: pnpm turbo build --filter="./packages/*"

      - name: Upload Package Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: built-packages
          path: |
            packages/*/dist
            packages/db/prisma

  # Quick helper to extract version for multi-platform app matrix
  set-version:
    name: Set Version Output
    runs-on: ubuntu-latest
    needs: release-management
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: get-version
        run: |
          VERSION=$(node -p "require('./apps/pos/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  # 3. Builds and Publishes POS to GitHub Releases (Matrix parallelization)
  publish-pos:
    name: Publish POS (${{ matrix.os }} - ${{ matrix.variant }})
    runs-on: ${{ matrix.os }}
    needs: [release-management, set-version, build-packages]
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        variant: [pharmacy, retail, standalone, supermarket, restaurant]
        include:
          - os: windows-latest
            args: --target x86_64-pc-windows-msvc
          - os: ubuntu-latest
            args: --target x86_64-unknown-linux-gnu
          - variant: retail
            features: retail
          - variant: standalone
            features: standalone
          - variant: restaurant
            features: restaurant
          - variant: supermarket
            features: supermarket
          - variant: pharmacy
            features: pharmacy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install System Dependencies (Linux Only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libglib2.0-dev \
            libudev-dev \
            libpcsclite-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Download Package Artifacts
        uses: actions/download-artifact@v4
        with:
          name: built-packages

      - name: Build POS App
        run: pnpm turbo build --filter=pos...

      - name: Build and Publish POS App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET || 'secret' }}
          VITE_BUSINESS_MODE: ${{ matrix.variant }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.POS_TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.POS_TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: ./apps/pos
          tagName: v${{ needs.set-version.outputs.version }}
          releaseName: "v${{ needs.set-version.outputs.version }}"
          releaseBody: "Release v${{ needs.set-version.outputs.version }}"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }} --config src-tauri/tauri.${{ matrix.variant }}.conf.json --features ${{ matrix.features }}

  # 4. Builds and Publishes Bakery App (Matrix parallelization)
  publish-bakery:
    name: Publish Bakery App (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [release-management, set-version, build-packages]
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        include:
          - os: windows-latest
            args: --target x86_64-pc-windows-msvc
          - os: ubuntu-latest
            args: --target x86_64-unknown-linux-gnu
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install System Dependencies (Linux Only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libglib2.0-dev \
            libudev-dev

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Download Package Artifacts
        uses: actions/download-artifact@v4
        with:
          name: built-packages

      - name: Build Bakery App
        run: pnpm turbo build --filter=bakery...

      - name: Build and Publish Bakery App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET || 'secret' }}
        with:
          projectPath: ./apps/bakery
          tagName: v${{ needs.set-version.outputs.version }}
          releaseName: "v${{ needs.set-version.outputs.version }}"
          releaseBody: "Release v${{ needs.set-version.outputs.version }}"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # 5. Builds Docker Images (Runs after packages are verified)
  docker-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [release-management, build-packages]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Convert repository name to lowercase
        id: repo-lower
        run: |
          echo "repo_lower=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Get current version
        id: get-version
        run: |
          VERSION=$(node -p "require('./apps/bakery/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push Docker images
        uses: docker/bake-action@v7
        env:
          REPO_LOWER: ${{ steps.repo-lower.outputs.repo_lower }}
          VERSION: ${{ steps.get-version.outputs.version }}
        with:
          files: |
            ./docker-bake.hcl
          targets: default
          push: true
          set: |
            *.args.NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            *.args.BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET || 'secret' }}
