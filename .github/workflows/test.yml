name: Test Suite

on:
  push:
    branches: [main, develop, beta, nextgen]
  pull_request:
    branches: [main, develop, beta, nextgen]

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.changes.outputs.frontend }}
      backend: ${{ steps.changes.outputs.backend }}
      e2e: ${{ steps.changes.outputs.e2e }}
      workflow: ${{ steps.changes.outputs.workflow }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            frontend:
              - 'src/**'
              - 'public/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig.json'
              - 'vite.config.ts'
              - 'vitest.config.ts'
              - 'components.json'
              - 'oxlint.json'
            backend:
              - 'src-tauri/**'
              - 'srctauri/**'
              - 'packages/**'
            e2e:
              - 'e2e/**'
              - 'playwright.config.ts'
            workflow:
              - '.github/workflows/test.yml'

  lint-frontend:
    needs: filter
    if: needs.filter.outputs.frontend == 'true' || needs.filter.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Node dependencies
        run: pnpm install

      - name: Run Frontend Linting
        run: pnpm run lint:frontend

  test-frontend:
    needs: [filter, lint-frontend]
    if: |
      always() &&
      (needs.filter.outputs.frontend == 'true' || needs.filter.outputs.workflow == 'true') &&
      needs.lint-frontend.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run Frontend Tests
        run: pnpm test:frontend

  test-backend:
    needs: filter
    if: needs.filter.outputs.backend == 'true' || needs.filter.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Node dependencies
        run: pnpm install

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libudev-dev \
            libusb-1.0-0-dev \
            libpcsclite-dev \
            pkg-config \
            patchelf

      - name: Create dummy binaries for macOS/Linux
        run: |
          mkdir -p src-tauri/binaries
          touch src-tauri/binaries/sumatrapdf-x86_64-apple-darwin
          touch src-tauri/binaries/sumatrapdf-aarch64-apple-darwin
          touch src-tauri/binaries/sumatrapdf-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/*

      - name: Generate .env file for tests
        run: |
          echo "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" >> src-tauri/.env
          echo "POSTHOG_API_KEY=${{ secrets.POSTHOG_API_KEY }}" >> src-tauri/.env
          echo "POSTHOG_HOST=${{ secrets.POSTHOG_HOST }}" >> src-tauri/.env

      - name: Run Backend Linting
        run: pnpm run lint:backend

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Run Backend Tests with Coverage
        run: |
          cargo tarpaulin --ignore-tests --manifest-path src-tauri/Cargo.toml --out Xml

  test-e2e:
    needs: [filter, test-frontend, test-backend]
    if: |
      always() &&
      (needs.filter.outputs.frontend == 'true' || needs.filter.outputs.backend == 'true' || needs.filter.outputs.e2e == 'true' || needs.filter.outputs.workflow == 'true') &&
      (needs.test-frontend.result == 'success' || (needs.filter.outputs.frontend != 'true' && needs.filter.outputs.workflow != 'true')) &&
      (needs.test-backend.result == 'success' || (needs.filter.outputs.backend != 'true' && needs.filter.outputs.workflow != 'true'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      - name: Run E2E tests
        run: pnpm test:e2e

  test-build:
    needs: [filter, test-e2e]
    if: |
      always() &&
      (needs.filter.outputs.frontend == 'true' || needs.filter.outputs.backend == 'true' || needs.filter.outputs.workflow == 'true') &&
      needs.test-e2e.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [retail, standalone, restaurant, supermarket, pharmacy]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install dependencies (ubuntu only)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libudev-dev libusb-1.0-0-dev libgtk-3-dev libpcsclite-dev pkg-config

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Create dummy binaries for macOS/Linux
        run: |
          mkdir -p src-tauri/binaries
          touch src-tauri/binaries/sumatrapdf-x86_64-apple-darwin
          touch src-tauri/binaries/sumatrapdf-aarch64-apple-darwin
          touch src-tauri/binaries/sumatrapdf-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/*

      - name: Generate .env file for smoke test
        run: |
          echo "POSTHOG_API_KEY=mock" >> src-tauri/.env
          echo "SENTRY_DSN=mock" >> src-tauri/.env

      - name: Build Tauri App (Smoke Test)
        run: |
          if [ "${{ matrix.variant }}" = "retail" ]; then
            pnpm build:retail --no-bundle
          elif [ "${{ matrix.variant }}" = "standalone" ]; then
            pnpm build:standalone --no-bundle
          elif [ "${{ matrix.variant }}" = "restaurant" ]; then
            pnpm build:restaurant --no-bundle
          elif [ "${{ matrix.variant }}" = "supermarket" ]; then
            pnpm build:supermarket --no-bundle
          elif [ "${{ matrix.variant }}" = "pharmacy" ]; then
            pnpm build:pharmacy --no-bundle
          fi
