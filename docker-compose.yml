services:
  db:
    image: postgres:17-alpine
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5438:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - scryme-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    restart: always
    networks:
      - scryme-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    networks:
      - scryme-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rustfs-perms:
    image: alpine
    user: root
    volumes:
      - rustfs_data:/fix_path
    command: chown -R 10001:10001 /fix_path
    networks:
      - scryme-network

  rustfs:
    image: rustfs/rustfs:latest
    restart: always
    environment:
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY}
      - RUSTFS_CONSOLE_ENABLE=true
    volumes:
      - rustfs_data:/data
    depends_on:
      rustfs-perms:
        condition: service_completed_successfully
    networks:
      - scryme-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rustfs.rule=Host(`${RUSTFS_DOMAIN:-storage.scryme.local}`)"
      - "traefik.http.services.rustfs.loadbalancer.server.port=9000"

  loki:
    image: grafana/loki:latest
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/tmp/loki
    networks:
      - scryme-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3100/ready",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  promtail:
    image: grafana/promtail:latest
    volumes:
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    entrypoint:
      - sh
      - -c
      - |
        mkdir -p /etc/promtail
        cat <<EOF > /etc/promtail/config.yml
        server:
          http_listen_port: 9080
          grpc_listen_port: 0
        positions:
          filename: /tmp/positions.yaml
        clients:
          - url: http://loki:3100/loki/api/v1/push
        scrape_configs:
        - job_name: docker
          docker_sd_configs:
            - host: unix:///var/run/docker.sock
              refresh_interval: 5s
          relabel_configs:
            - source_labels: ['__meta_docker_container_name']
              regex: '/(.*)'
              target_label: 'container'
        EOF
        promtail -config.file=/etc/promtail/config.yml
    networks:
      - scryme-network

  api:
    image: ghcr.io/larrybwosi/scryme/api:latest
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=4000
      - REALTIME_PROVIDER=socketio
      - SOCKET_URL=http://api:4000
      - ZITADEL_API_URL=${ZITADEL_API_URL}
      - ZITADEL_ORG_ID=${ZITADEL_ORG_ID}
      - ZITADEL_PROJECT_ID=${ZITADEL_PROJECT_ID}
    ports:
      - "3002:4000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - scryme-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:4000/api/v2/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${API_DOMAIN:-api.scryme.local}`)"
      - "traefik.http.services.api.loadbalancer.server.port=${PORT:-4000}"
      - "logging_job=api"

  web:
    image: ghcr.io/larrybwosi/scryme/web:latest
    restart: always
    deploy:
      resources:
        limits:
          memory: 768M
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_REALTIME_PROVIDER=socketio
      - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL:-http://api.scryme.local}
      - PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - scryme-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`${WEB_DOMAIN:-scryme.local}`)"
      - "traefik.http.services.web.loadbalancer.server.port=${PORT:-3000}"
      - "logging_job=web"

  crm:
    image: ghcr.io/larrybwosi/scryme/crm:latest
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_REALTIME_PROVIDER=socketio
      - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL:-http://api.scryme.local}
      - PORT=3001
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - scryme-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3001/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.crm.rule=Host(`${CRM_DOMAIN:-crm.scryme.local}`)"
      - "traefik.http.services.crm.loadbalancer.server.port=${PORT:-3001}"
      - "logging_job=crm"

  bakery:
    image: ghcr.io/larrybwosi/scryme/bakery:latest
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      - VITE_API_URL=${NEXT_PUBLIC_API_URL}
      - PORT=3003
    ports:
      - "3003:3003"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - scryme-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3003/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bakery.rule=Host(`${BAKERY_DOMAIN:-bakery.scryme.local}`)"
      - "traefik.http.services.bakery.loadbalancer.server.port=${PORT:-3003}"
      - "logging_job=bakery"

volumes:
  postgres_data:
  rustfs_data:
  loki_data:

networks:
  scryme-network:
    driver: bridge
