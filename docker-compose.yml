services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-scryme}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - scryme-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-scryme}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    restart: always
    ports:
      - '6379:6379'
    networks:
      - scryme-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    ports:
      - '5672:5672'
      - '15672:15672'
    networks:
      - scryme-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rustfs-perms:
    image: alpine
    user: root
    volumes:
      - rustfs_data:/fix_path
    command: chown -R 10001:10001 /fix_path
    networks:
      - scryme-network

  rustfs:
    image: rustfs/rustfs:latest
    restart: always
    environment:
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY:-admin}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY:-password}
      - RUSTFS_CONSOLE_ENABLE=true
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rustfs_data:/data
    depends_on:
      rustfs-perms:
        condition: service_completed_successfully
    networks:
      - scryme-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rustfs.rule=Host(`${RUSTFS_DOMAIN:-storage.scryme.local}`)"
      - "traefik.http.services.rustfs.loadbalancer.server.port=9000"

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./docker/loki/local-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/tmp/loki
    networks:
      - scryme-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  promtail:
    image: grafana/promtail:latest
    volumes:
      - /var/log:/var/log
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker/promtail/config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - scryme-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: scryme-api:latest
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=4000
      - REALTIME_PROVIDER=socketio
      - SOCKET_URL=http://api:4000
      - ZITADEL_API_URL=${ZITADEL_API_URL}
      - ZITADEL_ORG_ID=${ZITADEL_ORG_ID}
      - ZITADEL_PROJECT_ID=${ZITADEL_PROJECT_ID}
    ports:
      - '3002:4000'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - scryme-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${API_DOMAIN:-api.scryme.local}`)"
      - "traefik.http.services.api.loadbalancer.server.port=4000"
      - "logging_job=api"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
    image: scryme-web:latest
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_REALTIME_PROVIDER=socketio
      - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL:-http://api.scryme.local}
      - PORT=3000
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - scryme-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`${WEB_DOMAIN:-scryme.local}`)"
      - "traefik.http.services.web.loadbalancer.server.port=3000"
      - "logging_job=web"

volumes:
  postgres_data:
  rustfs_data:
  loki_data:

networks:
  scryme-network:
    driver: bridge
