services:
  # --- DATABASE ---
  db:
    image: postgres:17-alpine
    restart: always
    env_file:
      - .env.example
      - path: .env
        required: false
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-dbuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-dbpassword}
      - POSTGRES_DB=${POSTGRES_DB:-app_db}
    ports:
      - "5438:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - scryme-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- CACHE ---
  redis:
    image: redis:alpine
    restart: always
    networks:
      - scryme-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- MESSAGE BROKER ---
  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    networks:
      - scryme-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- PERMISSION FIXER FOR NON-ROOT CONTAINERS ---
  vol-perms:
    image: alpine
    user: root
    volumes:
      - rustfs_data:/fix_rustfs
      - loki_data:/fix_loki
    command: sh -c "chown -R 10001:10001 /fix_rustfs /fix_loki && touch /tmp/done && sleep infinity"
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/done"]
      interval: 5s
      timeout: 2s
      retries: 3
    networks:
      - scryme-network

  # --- OBJECT STORAGE (S3) ---
  rustfs:
    image: rustfs/rustfs:latest
    restart: always
    env_file:
      - .env.example
      - path: .env
        required: false
    environment:
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY:-your-access-key}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY:-your-secret-key}
      - RUSTFS_CONSOLE_ENABLE=true
    volumes:
      - rustfs_data:/data
    depends_on:
      vol-perms:
        condition: service_healthy
    networks:
      - scryme-network
      - proxy-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://localhost:9000/health || wget --no-verbose --tries=1 --spider http://localhost:9000/health || nc -z localhost 9000 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- LOGGING INFRASTRUCTURE ---
  loki:
    image: grafana/loki:latest
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/tmp/loki
    depends_on:
      vol-perms:
        condition: service_healthy
    networks:
      - scryme-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3100/ready",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  promtail:
    image: grafana/promtail:latest
    volumes:
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Mount the folder instead of the file to prevent the "not a directory" error
      - ./:/mnt/config/:ro
    command: -config.file=/mnt/config/promtail-config.yml
    networks:
      - scryme-network

  # --- APPLICATIONS ---
  api:
    image: ghcr.io/larrybwosi/scryme/api:9.8.0
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
    env_file:
      - .env.example
      - path: .env
        required: false
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://dbuser:dbpassword@db:5432/app_db?schema=public}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - PORT=${API_PORT:-4000}
      - REALTIME_PROVIDER=${REALTIME_PROVIDER:-socketio}
      - SOCKET_URL=${SOCKET_URL:-https://api.scryme.tech}
      - ZITADEL_API_URL=${ZITADEL_API_URL:-https://zitadel.example.com}
      - ZITADEL_ORG_ID=${ZITADEL_ORG_ID:-org-id}
      - ZITADEL_PROJECT_ID=${ZITADEL_PROJECT_ID:-project-id}
      - JWT_SECRET=${JWT_SECRET:-jwtsecret1234567890jwtsecret}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-betterauthsecret1234567890secret}
      - INTERNAL_ADMIN_SECRET=${INTERNAL_ADMIN_SECRET:-adminsecret1234567890secret}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-encryptionkey1234567890key12345}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - scryme-network
      - proxy-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:${API_PORT:-4000}/api/v2/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    image: ghcr.io/larrybwosi/scryme/web:9.8.0
    restart: always
    deploy:
      resources:
        limits:
          memory: 768M
    env_file:
      - .env.example
      - path: .env
        required: false
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://dbuser:dbpassword@db:5432/app_db?schema=public}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://api.scryme.tech}
      - NEXT_PUBLIC_REALTIME_PROVIDER=${NEXT_PUBLIC_REALTIME_PROVIDER:-socketio}
      - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL:-https://api.scryme.tech}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-betterauthsecret1234567890secret}
      - PORT=${WEB_PORT:-3000}
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - scryme-network
      - proxy-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:${WEB_PORT:-3000}/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  crm:
    image: ghcr.io/larrybwosi/scryme/crm:9.8.0
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    env_file:
      - .env.example
      - path: .env
        required: false
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://dbuser:dbpassword@db:5432/app_db?schema=public}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://api.scryme.tech}
      - NEXT_PUBLIC_REALTIME_PROVIDER=${NEXT_PUBLIC_REALTIME_PROVIDER:-socketio}
      - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL:-https://api.scryme.tech}
      - PORT=${CRM_PORT:-3001}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-betterauthsecret1234567890secret}
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - scryme-network
      - proxy-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:${CRM_PORT:-3001}/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  bakery:
    image: ghcr.io/larrybwosi/scryme/bakery:9.8.0
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
    env_file:
      - .env.example
    environment:
      - VITE_API_URL=${NEXT_PUBLIC_API_URL:-https://api.scryme.tech}
      - PORT=${BAKERY_PORT:-3003}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - scryme-network
      - proxy-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:${BAKERY_PORT:-3003}/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  rustfs_data:
  loki_data:

networks:
  scryme-network:
    driver: bridge
  proxy-network:
    name: ${PROXY_NETWORK_NAME:-dokploy-network}
    external: true
