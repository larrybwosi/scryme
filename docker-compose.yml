services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - scryme-network

  redis:
    image: redis:latest
    restart: always
    ports:
      - '6379:6379'
    networks:
      - scryme-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    ports:
      - '5672:5672'
      - '15672:15672'
    networks:
      - scryme-network

  api:
    image: ghcr.io/larrybwosi/scryme-api:latest
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=4000
      # Zitadel configuration placeholders
      - ZITADEL_API_URL=${ZITADEL_API_URL}
      - ZITADEL_ORG_ID=${ZITADEL_ORG_ID}
      - ZITADEL_PROJECT_ID=${ZITADEL_PROJECT_ID}
    ports:
      - '3002:4000'
    depends_on:
      - db
      - redis
      - rabbitmq
    networks:
      - scryme-network

  crm:
    image: ghcr.io/larrybwosi/scryme-crm:latest
    build:
      context: .
      dockerfile: apps/crm/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - PORT=3001
      # Zitadel configuration placeholders
      - ZITADEL_API_URL=${ZITADEL_API_URL}
      - ZITADEL_CLIENT_ID=${ZITADEL_CLIENT_ID}
    ports:
      - '3001:3001'
    depends_on:
      - db
      - api
    networks:
      - scryme-network

  web:
    image: ghcr.io/larrybwosi/scryme-web:latest
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - PORT=3000
    ports:
      - '3000:3000'
    depends_on:
      - db
      - api
    networks:
      - scryme-network

volumes:
  postgres_data:

networks:
  scryme-network:
    driver: bridge
