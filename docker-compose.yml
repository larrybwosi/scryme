services:
  # --- INTERNAL INFRASTRUCTURE (No Traefik labels needed) ---
  db:
    image: postgres:17-alpine
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-dbuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-dbpassword}
      - POSTGRES_DB=${POSTGRES_DB:-app_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - scryme-network

  redis:
    image: redis:alpine
    restart: always
    networks:
      - scryme-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    networks:
      - scryme-network

  vol-perms:
    image: alpine
    user: root
    volumes:
      - rustfs_data:/fix_rustfs
      - loki_data:/fix_loki
    command: sh -c "chown -R 10001:10001 /fix_rustfs /fix_loki && touch /tmp/done && sleep infinity"
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/done"]

  # --- EXPOSED SERVICES (Traefik Routed) ---
  rustfs:
    image: rustfs/rustfs:latest
    restart: always
    environment:
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY:-your-access-key}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY:-your-secret-key}
      - RUSTFS_CONSOLE_ENABLE=true
    volumes:
      - rustfs_data:/data
    depends_on:
      vol-perms:
        condition: service_healthy
    networks:
      - scryme-network
      - dokploy-network
    labels:
      - "traefik.enable=true"
      # S3 API Endpoint
      - "traefik.http.routers.rustfs-api.rule=Host(`s3.yourdomain.com`)"
      - "traefik.http.routers.rustfs-api.entrypoints=websecure"
      - "traefik.http.routers.rustfs-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.rustfs-api.loadbalancer.server.port=9000"
      # RustFS Web Console
      - "traefik.http.routers.rustfs-console.rule=Host(`s3-console.yourdomain.com`)"
      - "traefik.http.routers.rustfs-console.entrypoints=websecure"
      - "traefik.http.routers.rustfs-console.tls.certresolver=letsencrypt"
      - "traefik.http.services.rustfs-console.loadbalancer.server.port=9001"

  api:
    image: ghcr.io/larrybwosi/scryme/api:9.7.0
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://dbuser:dbpassword@db:5432/app_db?schema=public}
      - PORT=${API_PORT:-4000}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - scryme-network
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.scryme-api.rule=Host(`api.yourdomain.com`)"
      - "traefik.http.routers.scryme-api.entrypoints=websecure"
      - "traefik.http.routers.scryme-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.scryme-api.loadbalancer.server.port=4000"

  web:
    image: ghcr.io/larrybwosi/scryme/web:9.7.0
    restart: always
    environment:
      - PORT=${WEB_PORT:-3000}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - scryme-network
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.scryme-web.rule=Host(`app.yourdomain.com`)"
      - "traefik.http.routers.scryme-web.entrypoints=websecure"
      - "traefik.http.routers.scryme-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.scryme-web.loadbalancer.server.port=3000"

  crm:
    image: ghcr.io/larrybwosi/scryme/crm:9.7.0
    restart: always
    environment:
      - PORT=${CRM_PORT:-3001}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - scryme-network
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.scryme-crm.rule=Host(`crm.yourdomain.com`)"
      - "traefik.http.routers.scryme-crm.entrypoints=websecure"
      - "traefik.http.routers.scryme-crm.tls.certresolver=letsencrypt"
      - "traefik.http.services.scryme-crm.loadbalancer.server.port=3001"

  bakery:
    image: ghcr.io/larrybwosi/scryme/bakery:9.7.0
    restart: always
    environment:
      - PORT=${BAKERY_PORT:-3003}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - scryme-network
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.scryme-bakery.rule=Host(`bakery.yourdomain.com`)"
      - "traefik.http.routers.scryme-bakery.entrypoints=websecure"
      - "traefik.http.routers.scryme-bakery.tls.certresolver=letsencrypt"
      - "traefik.http.services.scryme-bakery.loadbalancer.server.port=3003"

volumes:
  postgres_data:
  rustfs_data:
  loki_data:

networks:
  scryme-network:
    driver: bridge
  dokploy-network:
    external: true
