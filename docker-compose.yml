services:
  db:
    image: postgres:17-alpine
    restart: always
    env_file:
      - .env.example
      - path: .env
        required: false
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-dbuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-dbpassword}
      - POSTGRES_DB=${POSTGRES_DB:-app_db}
    ports:
      - "5438:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - scryme-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    restart: always
    networks:
      - scryme-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    networks:
      - scryme-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rustfs-perms:
    image: alpine
    user: root
    volumes:
      - rustfs_data:/fix_path
    command: chown -R 10001:10001 /fix_path
    networks:
      - scryme-network

  rustfs:
    image: rustfs/rustfs:latest
    restart: always
    env_file:
      - .env.example
      - path: .env
        required: false
    environment:
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY:-your-access-key}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY:-your-secret-key}
      - RUSTFS_CONSOLE_ENABLE=true
    volumes:
      - rustfs_data:/data
    depends_on:
      rustfs-perms:
        condition: service_completed_successfully
    networks:
      - scryme-network
      - proxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${PROXY_NETWORK:-dokploy-network}"
      - "traefik.http.routers.rustfs.rule=Host(`${RUSTFS_DOMAIN:-storage.scryme.local}`)"
      - "traefik.http.routers.rustfs.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.rustfs.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.services.rustfs.loadbalancer.server.port=9000"

  loki:
    image: grafana/loki:latest
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/tmp/loki
    networks:
      - scryme-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3100/ready",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  promtail:
    image: grafana/promtail:latest
    volumes:
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    entrypoint:
      - sh
      - -c
      - |
        mkdir -p /etc/promtail
        cat <<EOF > /etc/promtail/config.yml
        server:
          http_listen_port: 9080
          grpc_listen_port: 0
        positions:
          filename: /tmp/positions.yaml
        clients:
          - url: http://loki:3100/loki/api/v1/push
        scrape_configs:
        - job_name: docker
          docker_sd_configs:
            - host: unix:///var/run/docker.sock
              refresh_interval: 5s
          relabel_configs:
            - source_labels: ['__meta_docker_container_name']
              regex: '/(.*)'
              target_label: 'container'
        EOF
        promtail -config.file=/etc/promtail/config.yml
    networks:
      - scryme-network

  api:
    image: ghcr.io/larrybwosi/scryme/api:9.4.0
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
    env_file:
      - .env.example
      - path: .env
        required: false
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://dbuser:dbpassword@db:5432/app_db?schema=public}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - PORT=4000
      - REALTIME_PROVIDER=${REALTIME_PROVIDER:-socketio}
      - SOCKET_URL=${SOCKET_URL:-https://${API_DOMAIN:-api.scryme.local}}
      - ZITADEL_API_URL=${ZITADEL_API_URL:-https://zitadel.example.com}
      - ZITADEL_ORG_ID=${ZITADEL_ORG_ID:-org-id}
      - ZITADEL_PROJECT_ID=${ZITADEL_PROJECT_ID:-project-id}
      - JWT_SECRET=${JWT_SECRET:-jwtsecret1234567890jwtsecret}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-betterauthsecret1234567890secret}
      - INTERNAL_ADMIN_SECRET=${INTERNAL_ADMIN_SECRET:-adminsecret1234567890secret}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-encryptionkey1234567890key12345}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - scryme-network
      - proxy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:4000/api/v2/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${PROXY_NETWORK:-dokploy-network}"
      - "traefik.http.routers.api.rule=Host(`${API_DOMAIN:-api.scryme.local}`)"
      - "traefik.http.routers.api.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.api.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.services.api.loadbalancer.server.port=4000"
      - "logging_job=api"

  web:
    image: ghcr.io/larrybwosi/scryme/web:9.4.0
    restart: always
    deploy:
      resources:
        limits:
          memory: 768M
    env_file:
      - .env.example
      - path: .env
        required: false
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://dbuser:dbpassword@db:5432/app_db?schema=public}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://${API_DOMAIN:-api.scryme.local}}
      - NEXT_PUBLIC_REALTIME_PROVIDER=${NEXT_PUBLIC_REALTIME_PROVIDER:-socketio}
      - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL:-https://${API_DOMAIN:-api.scryme.local}}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-betterauthsecret1234567890secret}
      - PORT=3000
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - scryme-network
      - proxy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${PROXY_NETWORK:-dokploy-network}"
      - "traefik.http.routers.web.rule=Host(`${WEB_DOMAIN:-scryme.local}`)"
      - "traefik.http.routers.web.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.web.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.services.web.loadbalancer.server.port=3000"
      - "logging_job=web"

  crm:
    image: ghcr.io/larrybwosi/scryme/crm:9.4.0
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    env_file:
      - .env.example
      - path: .env
        required: false
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://dbuser:dbpassword@db:5432/app_db?schema=public}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://${API_DOMAIN:-api.scryme.local}}
      - NEXT_PUBLIC_REALTIME_PROVIDER=${NEXT_PUBLIC_REALTIME_PROVIDER:-socketio}
      - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL:-https://${API_DOMAIN:-api.scryme.local}}
      - PORT=3001
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-betterauthsecret1234567890secret}
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - scryme-network
      - proxy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3001/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${PROXY_NETWORK:-dokploy-network}"
      - "traefik.http.routers.crm.rule=Host(`${CRM_DOMAIN:-crm.scryme.local}`)"
      - "traefik.http.routers.crm.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.crm.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.services.crm.loadbalancer.server.port=3001"
      - "logging_job=crm"

  bakery:
    image: ghcr.io/larrybwosi/scryme/bakery:9.4.0
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
    env_file:
      - .env.example
    environment:
      - VITE_API_URL=${NEXT_PUBLIC_API_URL:-https://${API_DOMAIN:-api.scryme.local}}
      - PORT=3003
    depends_on:
      api:
        condition: service_healthy
    networks:
      - scryme-network
      - proxy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3003/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${PROXY_NETWORK:-dokploy-network}"
      - "traefik.http.routers.bakery.rule=Host(`${BAKERY_DOMAIN:-bakery.scryme.local}`)"
      - "traefik.http.routers.bakery.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.bakery.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.services.bakery.loadbalancer.server.port=3003"
      - "logging_job=bakery"

volumes:
  postgres_data:
  rustfs_data:
  loki_data:

networks:
  scryme-network:
    driver: bridge

  # The platform-managed proxy network. Dokploy creates "dokploy-network",
  # Coolify creates "coolify" (run `docker network ls` after installing the
  # platform to confirm the exact name) — set PROXY_NETWORK in your .env to
  # match. It must already exist; that's why it's external rather than
  # created here.
  proxy:
    name: ${PROXY_NETWORK:-dokploy-network}
    external: true
